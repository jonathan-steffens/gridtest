<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Chess</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: grid;
            grid-template-rows: [legende] 15px [spielfeld] repeat(8, 1fr) [legende] 15px;
            grid-template-columns: [legende] 15px [spielfeld] repeat(8, 1fr) [legende] 15px;
            height: 100vw;
            grid-auto-rows: 10px;
            grid-auto-rows: 10px;
            grid-auto-columns: 10px;
        }

        .legende {
            border: 1px solid black;

        }


        .item {
            background: white;
        }

        .item:nth-child(16n+1 of .item),
        .item:nth-child(16n+3 of .item),
        .item:nth-child(16n+5 of .item),
        .item:nth-child(16n+7 of .item),
        .item:nth-child(16n+10 of .item),
        .item:nth-child(16n+12 of .item),
        .item:nth-child(16n+14 of .item),
        .item:nth-child(16n+16 of .item) {
            background: black;
        }

        .ecke:nth-child(1) {
            background-color: rosybrown;
            grid-area: 1 / 1 / span 1 / span 1;
        }

        .ecke:nth-child(2) {
            background-color: blue;
            grid-area: 1 / -2 / span 1 / span 1;
        }

        .ecke:nth-child(3) {
            background-color: red;
            grid-area: -2 / 1 / span 1 / span 1;

        }

        .ecke:nth-child(4) {
            background-color: green;
            grid-area: -2 / -2 / span 1 / span 1;

        }


        .legende {
            background: blueviolet;
        }

        .legende:nth-child(1 of .legende) {
            grid-area: 1/ 2/ span 1/ span 1;
        }

        .legende:nth-child(2 of .legende) {
            grid-area: 1/ 3/ span 1/ span 1;
        }

        .legende:nth-child(2 of .legende) {
            grid-area: 1/ 3/ span 1/ span 1;
        }

        .legende:nth-child(3 of .legende) {
            grid-area: 1/ 4/ span 1/ span 1;
        }

        .legende:nth-child(4 of .legende) {
            grid-area: 1/ 5/ span 1/ span 1;
        }

        .legende:nth-child(5 of .legende) {
            grid-area: 1/ 6/ span 1/ span 1;
        }

        .legende:nth-child(6 of .legende) {
            grid-area: 1/ 7/ span 1/ span 1;
        }

        .legende:nth-child(7 of .legende) {
            grid-area: 1/ 8/ span 1/ span 1;
        }

        .legende:nth-child(8 of .legende) {
            grid-area: 1/ 9/ span 1/ span 1;
        }

        .legende:nth-child(9 of .legende) {
            grid-area: 2/ 1/ span 1/ span 1;
        }

        .legende:nth-child(10 of .legende) {
            grid-area: 3/ 1/ span 1/ span 1;
        }

        .legende:nth-child(11 of .legende) {
            grid-area: 4/ 1/ span 1/ span 1;
        }

        .legende:nth-child(12 of .legende) {
            grid-area: 5/ 1/ span 1/ span 1;
        }

        .legende:nth-child(13 of .legende) {
            grid-area: 6/ 1/ span 1/ span 1;
        }

        .legende:nth-child(14 of .legende) {
            grid-area: 7/ 1/ span 1/ span 1;
        }

        .legende:nth-child(15 of .legende) {
            grid-area: 8/ 1/ span 1/ span 1;
        }

        .legende:nth-child(16 of .legende) {
            grid-area: 9/ 1/ span 1/ span 1;
        }



        .legende:nth-child(17 of .legende) {
            grid-area: 2/ -2/ span 1/ span 1;
        }

        .legende:nth-child(18 of .legende) {
            grid-area: 3/ -2/ span 1/ span 1;
        }

        .legende:nth-child(19 of .legende) {

        .legende:nth-child(24 of .legende) {
            grid-area: 9/ -2/ span 1/ span 1;
        }



        .legende:nth-child(25 of .legende) {

        .legende:nth-child(26 of .legende) {

        }
